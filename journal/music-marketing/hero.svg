<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0f2e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#07090f" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="pulse-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9d6fd4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9d6fd4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c49ef0" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#9d6fd4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#9d6fd4" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur-md">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="blur-lg">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="bounds">
      <rect width="1920" height="1080"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-glow)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#d8e2f0" stroke-width="1" clip-path="url(#bounds)">
    <!-- Vertical lines -->
    <line x1="192" y1="0" x2="192" y2="1080"/>
    <line x1="384" y1="0" x2="384" y2="1080"/>
    <line x1="576" y1="0" x2="576" y2="1080"/>
    <line x1="768" y1="0" x2="768" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1152" y1="0" x2="1152" y2="1080"/>
    <line x1="1344" y1="0" x2="1344" y2="1080"/>
    <line x1="1536" y1="0" x2="1536" y2="1080"/>
    <line x1="1728" y1="0" x2="1728" y2="1080"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="108" x2="1920" y2="108"/>
    <line x1="0" y1="216" x2="1920" y2="216"/>
    <line x1="0" y1="324" x2="1920" y2="324"/>
    <line x1="0" y1="432" x2="1920" y2="432"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="648" x2="1920" y2="648"/>
    <line x1="0" y1="756" x2="1920" y2="756"/>
    <line x1="0" y1="864" x2="1920" y2="864"/>
    <line x1="0" y1="972" x2="1920" y2="972"/>
  </g>

  <!-- Expanding signal rings — soft glow layer -->
  <circle cx="960" cy="540" r="80" fill="url(#pulse-glow)" filter="url(#blur-lg)"/>
  <circle cx="960" cy="540" r="200" fill="url(#pulse-glow)" filter="url(#blur-lg)" opacity="0.6"/>
  <circle cx="960" cy="540" r="360" fill="url(#pulse-glow)" filter="url(#blur-lg)" opacity="0.35"/>
  <circle cx="960" cy="540" r="560" fill="url(#pulse-glow)" filter="url(#blur-lg)" opacity="0.2"/>

  <!-- Expanding signal rings — stroke rings -->
  <circle cx="960" cy="540" r="110" fill="none" stroke="#9d6fd4" stroke-width="1.5" opacity="0.55"/>
  <circle cx="960" cy="540" r="200" fill="none" stroke="#9d6fd4" stroke-width="1.2" opacity="0.38"/>
  <circle cx="960" cy="540" r="310" fill="none" stroke="#9d6fd4" stroke-width="1" opacity="0.25"/>
  <circle cx="960" cy="540" r="440" fill="none" stroke="#9d6fd4" stroke-width="0.8" opacity="0.16"/>
  <circle cx="960" cy="540" r="590" fill="none" stroke="#9d6fd4" stroke-width="0.6" opacity="0.10"/>
  <circle cx="960" cy="540" r="760" fill="none" stroke="#9d6fd4" stroke-width="0.5" opacity="0.07"/>

  <!-- Waveform bar chart — centered at bottom third -->
  <g transform="translate(960, 760)" opacity="0.7">
    <!-- Bar heights represent a waveform / equalizer -->
    <rect x="-336" y="-90" width="12" height="90" rx="2" fill="#9d6fd4" opacity="0.3"/>
    <rect x="-318" y="-130" width="12" height="130" rx="2" fill="#9d6fd4" opacity="0.35"/>
    <rect x="-300" y="-60" width="12" height="60" rx="2" fill="#9d6fd4" opacity="0.3"/>
    <rect x="-282" y="-160" width="12" height="160" rx="2" fill="#9d6fd4" opacity="0.4"/>
    <rect x="-264" y="-100" width="12" height="100" rx="2" fill="#9d6fd4" opacity="0.35"/>
    <rect x="-246" y="-200" width="12" height="200" rx="2" fill="#9d6fd4" opacity="0.5"/>
    <rect x="-228" y="-140" width="12" height="140" rx="2" fill="#9d6fd4" opacity="0.42"/>
    <rect x="-210" y="-220" width="12" height="220" rx="2" fill="#9d6fd4" opacity="0.55"/>
    <rect x="-192" y="-170" width="12" height="170" rx="2" fill="#9d6fd4" opacity="0.48"/>
    <rect x="-174" y="-240" width="12" height="240" rx="2" fill="#9d6fd4" opacity="0.6"/>
    <rect x="-156" y="-190" width="12" height="190" rx="2" fill="#9d6fd4" opacity="0.52"/>
    <rect x="-138" y="-270" width="12" height="270" rx="2" fill="#9d6fd4" opacity="0.65"/>
    <rect x="-120" y="-210" width="12" height="210" rx="2" fill="#9d6fd4" opacity="0.58"/>
    <rect x="-102" y="-290" width="12" height="290" rx="2" fill="#c49ef0" opacity="0.72"/>
    <rect x="-84" y="-240" width="12" height="240" rx="2" fill="#c49ef0" opacity="0.65"/>
    <rect x="-66" y="-310" width="12" height="310" rx="2" fill="#c49ef0" opacity="0.8"/>
    <rect x="-48" y="-260" width="12" height="260" rx="2" fill="#c49ef0" opacity="0.72"/>
    <rect x="-30" y="-320" width="12" height="320" rx="2" fill="#c49ef0" opacity="0.88"/>
    <rect x="-12" y="-280" width="12" height="280" rx="2" fill="#c49ef0" opacity="0.78"/>
    <!-- Center peak -->
    <rect x="6" y="-340" width="12" height="340" rx="2" fill="#c49ef0" opacity="0.95"/>
    <rect x="24" y="-290" width="12" height="290" rx="2" fill="#c49ef0" opacity="0.82"/>
    <rect x="42" y="-325" width="12" height="325" rx="2" fill="#c49ef0" opacity="0.9"/>
    <rect x="60" y="-270" width="12" height="270" rx="2" fill="#c49ef0" opacity="0.75"/>
    <rect x="78" y="-310" width="12" height="310" rx="2" fill="#c49ef0" opacity="0.82"/>
    <rect x="96" y="-240" width="12" height="240" rx="2" fill="#9d6fd4" opacity="0.68"/>
    <rect x="114" y="-285" width="12" height="285" rx="2" fill="#9d6fd4" opacity="0.65"/>
    <rect x="132" y="-210" width="12" height="210" rx="2" fill="#9d6fd4" opacity="0.58"/>
    <rect x="150" y="-260" width="12" height="260" rx="2" fill="#9d6fd4" opacity="0.6"/>
    <rect x="168" y="-185" width="12" height="185" rx="2" fill="#9d6fd4" opacity="0.52"/>
    <rect x="186" y="-230" width="12" height="230" rx="2" fill="#9d6fd4" opacity="0.55"/>
    <rect x="204" y="-160" width="12" height="160" rx="2" fill="#9d6fd4" opacity="0.45"/>
    <rect x="222" y="-210" width="12" height="210" rx="2" fill="#9d6fd4" opacity="0.48"/>
    <rect x="240" y="-130" width="12" height="130" rx="2" fill="#9d6fd4" opacity="0.4"/>
    <rect x="258" y="-175" width="12" height="175" rx="2" fill="#9d6fd4" opacity="0.42"/>
    <rect x="276" y="-100" width="12" height="100" rx="2" fill="#9d6fd4" opacity="0.35"/>
    <rect x="294" y="-145" width="12" height="145" rx="2" fill="#9d6fd4" opacity="0.38"/>
    <rect x="312" y="-70" width="12" height="70" rx="2" fill="#9d6fd4" opacity="0.3"/>
  </g>

  <!-- Glow beneath waveform bars -->
  <rect x="480" y="700" width="960" height="120" rx="4" fill="#9d6fd4" opacity="0.04" filter="url(#blur-lg)"/>

  <!-- Center dot -->
  <circle cx="960" cy="540" r="6" fill="#c49ef0" opacity="0.95" filter="url(#blur-sm)"/>
  <circle cx="960" cy="540" r="3" fill="#ffffff" opacity="0.9"/>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="#07090f" stop-opacity="0"/>
    <stop offset="100%" stop-color="#07090f" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
